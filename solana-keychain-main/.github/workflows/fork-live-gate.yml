name: Fork Live Gate

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  fork-live-gate:
    name: fork-live-gate
    runs-on: ubuntu-latest
    steps:
      - name: Validate fork live marker
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed("This workflow only supports pull_request events.");
              return;
            }

            if (!pr.head.repo) {
              core.setFailed("The fork repository for this PR has been deleted. Cannot validate live-test marker.");
              return;
            }
            if (!pr.head.repo.fork) {
              core.info("Internal PR detected. No manual fork live-test marker required.");
              return;
            }

            const marker = `fork-external-live-pass:${pr.head.sha}`;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const markerFound = comments.some((comment) => {
              if (comment.user?.login !== "github-actions[bot]") {
                return false;
              }

              return typeof comment.body === "string" && comment.body.includes(marker);
            });

            if (!markerFound) {
              core.setFailed(
                [
                  `Missing marker for fork PR head SHA ${pr.head.sha}.`,
                  `Expected comment from github-actions[bot]: ${marker}`,
                  `A maintainer must run \"Fork External Live Tests\" with pr_number=${pr.number}.`,
                ].join("\n")
              );
              return;
            }

            core.info(`Found marker ${marker}.`);
