name: TypeScript CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  resolve-signers:
    runs-on: ubuntu-latest
    outputs:
      ts_unit_packages_json: ${{ steps.resolve.outputs.ts_unit_packages_json }}
      ts_unit_package_count: ${{ steps.resolve.outputs.ts_unit_package_count }}
      ts_integration_packages_json: ${{ steps.resolve.outputs.ts_integration_packages_json }}
      ts_integration_package_count: ${{ steps.resolve.outputs.ts_integration_package_count }}
      ts_enabled_packages_space: ${{ steps.resolve.outputs.ts_enabled_packages_space }}
      ts_all_signers_enabled: ${{ steps.resolve.outputs.ts_all_signers_enabled }}
    steps:
      - name: Resolve enabled signers from repository variables
        id: resolve
        uses: actions/github-script@v7
        env:
          CI_SIGNER_MEMORY_ENABLED: ${{ vars.CI_SIGNER_MEMORY_ENABLED }}
          CI_SIGNER_VAULT_ENABLED: ${{ vars.CI_SIGNER_VAULT_ENABLED }}
          CI_SIGNER_PRIVY_ENABLED: ${{ vars.CI_SIGNER_PRIVY_ENABLED }}
          CI_SIGNER_TURNKEY_ENABLED: ${{ vars.CI_SIGNER_TURNKEY_ENABLED }}
          CI_SIGNER_AWS_KMS_ENABLED: ${{ vars.CI_SIGNER_AWS_KMS_ENABLED }}
          CI_SIGNER_FIREBLOCKS_ENABLED: ${{ vars.CI_SIGNER_FIREBLOCKS_ENABLED }}
          CI_SIGNER_GCP_KMS_ENABLED: ${{ vars.CI_SIGNER_GCP_KMS_ENABLED }}
          CI_SIGNER_PARA_ENABLED: ${{ vars.CI_SIGNER_PARA_ENABLED }}
          CI_SIGNER_CDP_ENABLED: ${{ vars.CI_SIGNER_CDP_ENABLED }}
          CI_SIGNER_DFNS_ENABLED: ${{ vars.CI_SIGNER_DFNS_ENABLED }}
          CI_SIGNER_CROSSMINT_ENABLED: ${{ vars.CI_SIGNER_CROSSMINT_ENABLED }}
        with:
          script: |
            const parseVar = (name) => {
              const raw = process.env[name];
              if (raw !== 'true' && raw !== 'false') {
                const message = `${name} must be set to the string 'true' or 'false' in repository Actions variables. Received: ${raw ?? 'undefined'}`;
                core.setFailed(message);
                throw new Error(message);
              }
              return raw === 'true';
            };

            // CI_SIGNER_MEMORY_ENABLED is Rust-only; validate it exists but do not include it in TS package selection.
            parseVar('CI_SIGNER_MEMORY_ENABLED');

            const enabled = {
              vault: parseVar('CI_SIGNER_VAULT_ENABLED'),
              privy: parseVar('CI_SIGNER_PRIVY_ENABLED'),
              turnkey: parseVar('CI_SIGNER_TURNKEY_ENABLED'),
              fireblocks: parseVar('CI_SIGNER_FIREBLOCKS_ENABLED'),
              aws_kms: parseVar('CI_SIGNER_AWS_KMS_ENABLED'),
              gcp_kms: parseVar('CI_SIGNER_GCP_KMS_ENABLED'),
              para: parseVar('CI_SIGNER_PARA_ENABLED'),
              cdp: parseVar('CI_SIGNER_CDP_ENABLED'),
              dfns: parseVar('CI_SIGNER_DFNS_ENABLED'),
              crossmint: parseVar('CI_SIGNER_CROSSMINT_ENABLED'),
            };

            const packageBySigner = {
              vault: 'vault',
              privy: 'privy',
              turnkey: 'turnkey',
              fireblocks: 'fireblocks',
              aws_kms: 'aws-kms',
              gcp_kms: 'gcp-kms',
              para: 'para',
              cdp: 'cdp',
              dfns: 'dfns',
              crossmint: 'crossmint',
            };

            const unitSignerOrder = [
              'vault',
              'privy',
              'turnkey',
              'fireblocks',
              'aws_kms',
              'gcp_kms',
              'para',
              'cdp',
              'dfns',
              'crossmint',
            ];

            const integrationSignerOrder = [
              'privy',
              'turnkey',
              'fireblocks',
              'aws_kms',
              'gcp_kms',
              'para',
              'cdp',
              'dfns',
              'crossmint',
            ];

            const unitPackages = unitSignerOrder
              .filter((signer) => enabled[signer])
              .map((signer) => packageBySigner[signer]);
            const integrationPackages = integrationSignerOrder
              .filter((signer) => enabled[signer])
              .map((signer) => packageBySigner[signer]);

            core.setOutput('ts_unit_packages_json', JSON.stringify(unitPackages));
            core.setOutput('ts_unit_package_count', String(unitPackages.length));
            core.setOutput('ts_integration_packages_json', JSON.stringify(integrationPackages));
            core.setOutput('ts_integration_package_count', String(integrationPackages.length));
            core.setOutput('ts_enabled_packages_space', unitPackages.join(' '));
            core.setOutput(
              'ts_all_signers_enabled',
              String(unitSignerOrder.every((signer) => enabled[signer]))
            );

  typescript-test-unit:
    needs: resolve-signers
    if: ${{ needs.resolve-signers.outputs.ts_unit_package_count != '0' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    strategy:
      matrix:
        package: ${{ fromJSON(needs.resolve-signers.outputs.ts_unit_packages_json) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v2
        with:
          version: 10.14.0
      - name: Install dependencies
        run: pnpm install
      - name: Build packages
        run: pnpm -F @solana/keychain-${{ matrix.package }}... run build
      - name: Run unit tests for @solana/keychain-${{ matrix.package }}
        run: pnpm -F @solana/keychain-${{ matrix.package }} run test:unit

  typescript-test-integration:
    needs: resolve-signers
    if: ${{ (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) && needs.resolve-signers.outputs.ts_integration_package_count != '0' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: typescript
    strategy:
      matrix:
        package: ${{ fromJSON(needs.resolve-signers.outputs.ts_integration_packages_json) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v2
        with:
          version: 10.14.0
      - name: Configure AWS credentials
        if: matrix.package == 'aws-kms'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_KMS_REGION }}
      - name: Install dependencies
        run: pnpm install
      - name: Setup GCP credentials
        if: matrix.package == 'gcp-kms'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      - name: Build packages
        run: pnpm -F @solana/keychain-${{ matrix.package }}... run build
      - name: Run integration tests for @solana/keychain-${{ matrix.package }}
        env:
          # Privy
          PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID }}
          PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET }}
          PRIVY_WALLET_ID: ${{ secrets.PRIVY_WALLET_ID }}
          # Turnkey
          TURNKEY_API_PUBLIC_KEY: ${{ secrets.TURNKEY_API_KEY }}
          TURNKEY_API_PRIVATE_KEY: ${{ secrets.TURNKEY_API_PRIVATE_KEY }}
          TURNKEY_ORGANIZATION_ID: ${{ secrets.TURNKEY_ORGANIZATION_ID }}
          TURNKEY_PRIVATE_KEY_ID: ${{ secrets.TURNKEY_PRIVATE_KEY_ID }}
          TURNKEY_PUBLIC_KEY: ${{ secrets.TURNKEY_SIGNER_PUBKEY }}
          # Fireblocks
          FIREBLOCKS_API_KEY: ${{ secrets.FIREBLOCKS_API_KEY }}
          FIREBLOCKS_PRIVATE_KEY_PEM: ${{ secrets.FIREBLOCKS_PRIVATE_KEY_PEM }}
          FIREBLOCKS_VAULT_ACCOUNT_ID: ${{ secrets.FIREBLOCKS_VAULT_ACCOUNT_ID }}
          # GCP KMS
          GCP_KMS_KEY_NAME: ${{ secrets.GCP_KMS_KEY_NAME }}
          GCP_KMS_SIGNER_PUBKEY: ${{ secrets.GCP_KMS_SIGNER_PUBKEY }}
          # AWS KMS
          AWS_KMS_KEY_ID: ${{ secrets.AWS_KMS_KEY_ID }}
          AWS_KMS_SIGNER_PUBKEY: ${{ secrets.AWS_KMS_SIGNER_PUBKEY }}
          AWS_KMS_REGION: ${{ secrets.AWS_KMS_REGION }}
          # Para
          PARA_API_KEY: ${{ secrets.PARA_API_KEY }}
          PARA_WALLET_ID: ${{ secrets.PARA_WALLET_ID }}
          PARA_API_BASE_URL: ${{ secrets.PARA_API_BASE_URL }}
          # CDP
          CDP_API_KEY_ID: ${{ secrets.CDP_API_KEY_ID }}
          CDP_API_KEY_SECRET: ${{ secrets.CDP_API_KEY_SECRET }}
          CDP_WALLET_SECRET: ${{ secrets.CDP_WALLET_SECRET }}
          CDP_SOLANA_ADDRESS: ${{ secrets.CDP_SOLANA_ADDRESS }}
          # DFNS
          DFNS_AUTH_TOKEN: ${{ secrets.DFNS_AUTH_TOKEN }}
          DFNS_CRED_ID: ${{ secrets.DFNS_CRED_ID }}
          DFNS_PRIVATE_KEY_PEM: ${{ secrets.DFNS_PRIVATE_KEY_PEM }}
          DFNS_WALLET_ID: ${{ secrets.DFNS_WALLET_ID }}
          DFNS_API_BASE_URL: ${{ secrets.DFNS_API_BASE_URL }}
          # Crossmint
          CROSSMINT_API_KEY: ${{ secrets.CROSSMINT_API_KEY }}
          CROSSMINT_WALLET_LOCATOR: ${{ secrets.CROSSMINT_WALLET_LOCATOR }}
          CROSSMINT_API_BASE_URL: ${{ secrets.CROSSMINT_API_BASE_URL }}
          CROSSMINT_SIGNER_SECRET: ${{ secrets.CROSSMINT_SIGNER_SECRET }}
          CROSSMINT_SIGNER: ${{ secrets.CROSSMINT_SIGNER }}
        run: pnpm -F @solana/keychain-${{ matrix.package }} run test:integration

  typescript-lint:
    needs: resolve-signers
    if: ${{ needs.resolve-signers.outputs.ts_unit_package_count != '0' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    env:
      ENABLED_SIGNER_PACKAGES: ${{ needs.resolve-signers.outputs.ts_enabled_packages_space }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v2
        with:
          version: 10.14.0
      - name: Install dependencies
        run: pnpm install
      - name: Build packages
        run: |
          set -euo pipefail
          pnpm -F @solana/keychain-core run build
          pnpm -F @solana/keychain-test-utils run build
          for package_name in ${ENABLED_SIGNER_PACKAGES}; do
            pnpm -F "@solana/keychain-${package_name}"... run build
          done
          if [ "${{ needs.resolve-signers.outputs.ts_all_signers_enabled }}" = "true" ]; then
            pnpm -F @solana/keychain... run build
          fi
      - name: Typecheck
        run: |
          set -euo pipefail
          pnpm -F @solana/keychain-core run typecheck
          pnpm -F @solana/keychain-test-utils run typecheck
          for package_name in ${ENABLED_SIGNER_PACKAGES}; do
            pnpm -F "@solana/keychain-${package_name}"... run typecheck
          done
          if [ "${{ needs.resolve-signers.outputs.ts_all_signers_enabled }}" = "true" ]; then
            pnpm -F @solana/keychain run typecheck
          fi
      - name: Lint
        run: |
          set -euo pipefail
          targets=(packages/core packages/test-utils)
          for package_name in ${ENABLED_SIGNER_PACKAGES}; do
            targets+=("packages/${package_name}")
          done
          if [ "${{ needs.resolve-signers.outputs.ts_all_signers_enabled }}" = "true" ]; then
            targets+=("packages/keychain")
          fi
          pnpm exec eslint "${targets[@]}" --ext .ts
      - name: Format check
        run: |
          set -euo pipefail
          pnpm exec prettier --check "packages/core/**/*.{ts,json,md}" "packages/test-utils/**/*.{ts,json,md}"
          for package_name in ${ENABLED_SIGNER_PACKAGES}; do
            pnpm exec prettier --check "packages/${package_name}/**/*.{ts,json,md}"
          done
          if [ "${{ needs.resolve-signers.outputs.ts_all_signers_enabled }}" = "true" ]; then
            pnpm exec prettier --check "packages/keychain/**/*.{ts,json,md}"
          fi
      - name: Tree-shakability check
        run: |
          set -euo pipefail
          for package_name in ${ENABLED_SIGNER_PACKAGES}; do
            pnpm -F "@solana/keychain-${package_name}" run test:treeshakability
          done
          if [ "${{ needs.resolve-signers.outputs.ts_all_signers_enabled }}" = "true" ]; then
            pnpm test:treeshakability:umbrella
          else
            echo "Skipping umbrella tree-shakability check because one or more signers are disabled."
          fi
