name: Fork External Live Tests

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Fork pull request number
        required: true
        type: number

jobs:
  resolve-signers:
    runs-on: ubuntu-latest
    outputs:
      rust_live_tests_space: ${{ steps.resolve.outputs.rust_live_tests_space }}
      rust_live_test_count: ${{ steps.resolve.outputs.rust_live_test_count }}
      rust_ci_features: ${{ steps.resolve.outputs.rust_ci_features }}
      ts_live_packages_space: ${{ steps.resolve.outputs.ts_live_packages_space }}
      ts_live_package_count: ${{ steps.resolve.outputs.ts_live_package_count }}
      aws_kms_enabled: ${{ steps.resolve.outputs.aws_kms_enabled }}
    steps:
      - name: Resolve enabled signers from repository variables
        id: resolve
        uses: actions/github-script@v7
        env:
          CI_SIGNER_MEMORY_ENABLED: ${{ vars.CI_SIGNER_MEMORY_ENABLED }}
          CI_SIGNER_VAULT_ENABLED: ${{ vars.CI_SIGNER_VAULT_ENABLED }}
          CI_SIGNER_PRIVY_ENABLED: ${{ vars.CI_SIGNER_PRIVY_ENABLED }}
          CI_SIGNER_TURNKEY_ENABLED: ${{ vars.CI_SIGNER_TURNKEY_ENABLED }}
          CI_SIGNER_AWS_KMS_ENABLED: ${{ vars.CI_SIGNER_AWS_KMS_ENABLED }}
          CI_SIGNER_FIREBLOCKS_ENABLED: ${{ vars.CI_SIGNER_FIREBLOCKS_ENABLED }}
          CI_SIGNER_GCP_KMS_ENABLED: ${{ vars.CI_SIGNER_GCP_KMS_ENABLED }}
          CI_SIGNER_PARA_ENABLED: ${{ vars.CI_SIGNER_PARA_ENABLED }}
          CI_SIGNER_CDP_ENABLED: ${{ vars.CI_SIGNER_CDP_ENABLED }}
          CI_SIGNER_DFNS_ENABLED: ${{ vars.CI_SIGNER_DFNS_ENABLED }}
          CI_SIGNER_CROSSMINT_ENABLED: ${{ vars.CI_SIGNER_CROSSMINT_ENABLED }}
        with:
          script: |
            const parseVar = (name) => {
              const raw = process.env[name];
              if (raw !== 'true' && raw !== 'false') {
                const message = `${name} must be set to the string 'true' or 'false' in repository Actions variables. Received: ${raw ?? 'undefined'}`;
                core.setFailed(message);
                throw new Error(message);
              }
              return raw === 'true';
            };

            const enabled = {
              memory: parseVar('CI_SIGNER_MEMORY_ENABLED'),
              vault: parseVar('CI_SIGNER_VAULT_ENABLED'),
              privy: parseVar('CI_SIGNER_PRIVY_ENABLED'),
              turnkey: parseVar('CI_SIGNER_TURNKEY_ENABLED'),
              aws_kms: parseVar('CI_SIGNER_AWS_KMS_ENABLED'),
              fireblocks: parseVar('CI_SIGNER_FIREBLOCKS_ENABLED'),
              gcp_kms: parseVar('CI_SIGNER_GCP_KMS_ENABLED'),
              para: parseVar('CI_SIGNER_PARA_ENABLED'),
              cdp: parseVar('CI_SIGNER_CDP_ENABLED'),
              dfns: parseVar('CI_SIGNER_DFNS_ENABLED'),
              crossmint: parseVar('CI_SIGNER_CROSSMINT_ENABLED'),
            };

            const rustFeatureOrder = [
              'memory',
              'vault',
              'privy',
              'turnkey',
              'aws_kms',
              'fireblocks',
              'gcp_kms',
              'cdp',
              'para',
              'dfns',
              'crossmint',
            ];

            const rustLiveTestMap = [
              // gcp_kms omitted: Workload Identity OIDC is not available in the fork external-live environment.
              ['privy', 'test_privy_integration'],
              ['turnkey', 'test_turnkey_integration'],
              ['fireblocks', 'test_fireblocks_integration'],
              ['aws_kms', 'test_aws_kms_integration'],
              ['para', 'test_para_integration'],
              ['cdp', 'test_cdp_integration'],
              ['dfns', 'test_dfns_integration'],
              ['crossmint', 'test_crossmint_integration'],
            ];

            const tsLivePackageMap = [
              // gcp-kms omitted: Workload Identity OIDC is not available in the fork external-live environment.
              ['privy', 'privy'],
              ['turnkey', 'turnkey'],
              ['fireblocks', 'fireblocks'],
              ['aws_kms', 'aws-kms'],
              ['para', 'para'],
              ['cdp', 'cdp'],
              ['dfns', 'dfns'],
              ['crossmint', 'crossmint'],
            ];

            const rustFeatures = rustFeatureOrder.filter((backend) => enabled[backend]);
            const rustTests = rustLiveTestMap
              .filter(([signer]) => enabled[signer])
              .map(([, testName]) => testName);
            const tsPackages = tsLivePackageMap
              .filter(([signer]) => enabled[signer])
              .map(([, packageName]) => packageName);

            core.setOutput('rust_live_tests_space', rustTests.join(' '));
            core.setOutput('rust_live_test_count', String(rustTests.length));
            core.setOutput('rust_ci_features', rustFeatures.join(','));
            core.setOutput('ts_live_packages_space', tsPackages.join(' '));
            core.setOutput('ts_live_package_count', String(tsPackages.length));
            core.setOutput('aws_kms_enabled', String(enabled.aws_kms));

  fork-external-live-manual:
    needs: resolve-signers
    name: fork-external-live-manual
    runs-on: ubuntu-latest
    environment: external-live-tests
    permissions:
      actions: write
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: Validate PR and capture head SHA
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const rawPrNumber = '${{ inputs.pr_number }}';
            const prNumber = Number(rawPrNumber);
            if (!Number.isInteger(prNumber) || prNumber <= 0) {
              core.setFailed(`Invalid pr_number input: ${rawPrNumber}`);
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            if (!pr.head.repo) {
              core.setFailed(`PR #${prNumber}'s fork repository has been deleted.`);
              return;
            }
            if (!pr.head.repo.fork) {
              core.setFailed(`PR #${prNumber} is not from a fork. This workflow is only for fork PRs.`);
              return;
            }

            core.setOutput("pr_number", String(pr.number));
            core.setOutput("head_sha", pr.head.sha);
            core.setOutput("head_ref", pr.head.ref);
            core.info(`Running external live tests for fork PR #${pr.number} at ${pr.head.sha}.`);

      - name: Checkout PR head SHA
        if: ${{ needs.resolve-signers.outputs.rust_live_test_count != '0' || needs.resolve-signers.outputs.ts_live_package_count != '0' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}

      - if: ${{ needs.resolve-signers.outputs.rust_live_test_count != '0' }}
        uses: dtolnay/rust-toolchain@stable

      - if: ${{ needs.resolve-signers.outputs.ts_live_package_count != '0' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - if: ${{ needs.resolve-signers.outputs.ts_live_package_count != '0' }}
        uses: pnpm/action-setup@v2
        with:
          version: 10.14.0

      - name: Configure AWS credentials
        if: ${{ needs.resolve-signers.outputs.aws_kms_enabled == 'true' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_KMS_REGION }}

      - name: Run Rust external live integration tests
        if: ${{ needs.resolve-signers.outputs.rust_live_test_count != '0' }}
        working-directory: rust
        env:
          RUST_LIVE_TESTS: ${{ needs.resolve-signers.outputs.rust_live_tests_space }}
          RUST_CI_FEATURES: ${{ needs.resolve-signers.outputs.rust_ci_features }}
          PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID }}
          PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET }}
          PRIVY_WALLET_ID: ${{ secrets.PRIVY_WALLET_ID }}
          TURNKEY_API_PUBLIC_KEY: ${{ secrets.TURNKEY_API_KEY }}
          TURNKEY_API_PRIVATE_KEY: ${{ secrets.TURNKEY_API_PRIVATE_KEY }}
          TURNKEY_ORGANIZATION_ID: ${{ secrets.TURNKEY_ORGANIZATION_ID }}
          TURNKEY_PRIVATE_KEY_ID: ${{ secrets.TURNKEY_PRIVATE_KEY_ID }}
          TURNKEY_PUBLIC_KEY: ${{ secrets.TURNKEY_SIGNER_PUBKEY }}
          FIREBLOCKS_API_KEY: ${{ secrets.FIREBLOCKS_API_KEY }}
          FIREBLOCKS_PRIVATE_KEY_PEM: ${{ secrets.FIREBLOCKS_PRIVATE_KEY_PEM }}
          FIREBLOCKS_VAULT_ACCOUNT_ID: ${{ secrets.FIREBLOCKS_VAULT_ACCOUNT_ID }}
          AWS_KMS_KEY_ID: ${{ secrets.AWS_KMS_KEY_ID }}
          AWS_KMS_SIGNER_PUBKEY: ${{ secrets.AWS_KMS_SIGNER_PUBKEY }}
          AWS_KMS_REGION: ${{ secrets.AWS_KMS_REGION }}
          PARA_API_KEY: ${{ secrets.PARA_API_KEY }}
          PARA_WALLET_ID: ${{ secrets.PARA_WALLET_ID }}
          PARA_API_BASE_URL: ${{ secrets.PARA_API_BASE_URL }}
          CDP_API_KEY_ID: ${{ secrets.CDP_API_KEY_ID }}
          CDP_API_KEY_SECRET: ${{ secrets.CDP_API_KEY_SECRET }}
          CDP_WALLET_SECRET: ${{ secrets.CDP_WALLET_SECRET }}
          CDP_SOLANA_ADDRESS: ${{ secrets.CDP_SOLANA_ADDRESS }}
          DFNS_AUTH_TOKEN: ${{ secrets.DFNS_AUTH_TOKEN }}
          DFNS_CRED_ID: ${{ secrets.DFNS_CRED_ID }}
          DFNS_PRIVATE_KEY_PEM: ${{ secrets.DFNS_PRIVATE_KEY_PEM }}
          DFNS_WALLET_ID: ${{ secrets.DFNS_WALLET_ID }}
          DFNS_API_BASE_URL: ${{ secrets.DFNS_API_BASE_URL }}
          CROSSMINT_API_KEY: ${{ secrets.CROSSMINT_API_KEY }}
          CROSSMINT_WALLET_LOCATOR: ${{ secrets.CROSSMINT_WALLET_LOCATOR }}
          CROSSMINT_API_BASE_URL: ${{ secrets.CROSSMINT_API_BASE_URL }}
          CROSSMINT_SIGNER_SECRET: ${{ secrets.CROSSMINT_SIGNER_SECRET }}
          CROSSMINT_SIGNER: ${{ secrets.CROSSMINT_SIGNER }}
          SOLANA_RPC_URL: https://api.devnet.solana.com
        run: |
          set -euo pipefail

          if [ -z "${RUST_LIVE_TESTS}" ]; then
            echo "No enabled Rust external live integration tests; skipping."
            exit 0
          fi

          for sdk in v2 v3; do
            for test_name in ${RUST_LIVE_TESTS}; do
              echo "Running ${test_name} with ${sdk}"
              if [ "${sdk}" = "v2" ]; then
                cargo test --locked --no-default-features --features ${RUST_CI_FEATURES},sdk-v2,unsafe-debug,integration-tests tests::${test_name}::
              else
                cargo test --locked --no-default-features --features ${RUST_CI_FEATURES},sdk-v3,unsafe-debug,integration-tests tests::${test_name}::
              fi
            done
          done

      - name: Install TypeScript dependencies
        if: ${{ needs.resolve-signers.outputs.ts_live_package_count != '0' }}
        working-directory: typescript
        run: pnpm install

      - name: Build TypeScript packages
        if: ${{ needs.resolve-signers.outputs.ts_live_package_count != '0' }}
        env:
          TS_LIVE_PACKAGES: ${{ needs.resolve-signers.outputs.ts_live_packages_space }}
        working-directory: typescript
        run: |
          set -euo pipefail
          if [ -z "${TS_LIVE_PACKAGES}" ]; then
            echo "No enabled TypeScript external live integration packages; skipping build."
            exit 0
          fi

          for package_name in ${TS_LIVE_PACKAGES}; do
            pnpm -F "@solana/keychain-${package_name}"... run build
          done

      - name: Run TypeScript external live integration tests
        if: ${{ needs.resolve-signers.outputs.ts_live_package_count != '0' }}
        working-directory: typescript
        env:
          TS_LIVE_PACKAGES: ${{ needs.resolve-signers.outputs.ts_live_packages_space }}
          PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID }}
          PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET }}
          PRIVY_WALLET_ID: ${{ secrets.PRIVY_WALLET_ID }}
          TURNKEY_API_PUBLIC_KEY: ${{ secrets.TURNKEY_API_KEY }}
          TURNKEY_API_PRIVATE_KEY: ${{ secrets.TURNKEY_API_PRIVATE_KEY }}
          TURNKEY_ORGANIZATION_ID: ${{ secrets.TURNKEY_ORGANIZATION_ID }}
          TURNKEY_PRIVATE_KEY_ID: ${{ secrets.TURNKEY_PRIVATE_KEY_ID }}
          TURNKEY_PUBLIC_KEY: ${{ secrets.TURNKEY_SIGNER_PUBKEY }}
          FIREBLOCKS_API_KEY: ${{ secrets.FIREBLOCKS_API_KEY }}
          FIREBLOCKS_PRIVATE_KEY_PEM: ${{ secrets.FIREBLOCKS_PRIVATE_KEY_PEM }}
          FIREBLOCKS_VAULT_ACCOUNT_ID: ${{ secrets.FIREBLOCKS_VAULT_ACCOUNT_ID }}
          AWS_KMS_KEY_ID: ${{ secrets.AWS_KMS_KEY_ID }}
          AWS_KMS_SIGNER_PUBKEY: ${{ secrets.AWS_KMS_SIGNER_PUBKEY }}
          AWS_KMS_REGION: ${{ secrets.AWS_KMS_REGION }}
          PARA_API_KEY: ${{ secrets.PARA_API_KEY }}
          PARA_WALLET_ID: ${{ secrets.PARA_WALLET_ID }}
          PARA_API_BASE_URL: ${{ secrets.PARA_API_BASE_URL }}
          CDP_API_KEY_ID: ${{ secrets.CDP_API_KEY_ID }}
          CDP_API_KEY_SECRET: ${{ secrets.CDP_API_KEY_SECRET }}
          CDP_WALLET_SECRET: ${{ secrets.CDP_WALLET_SECRET }}
          CDP_SOLANA_ADDRESS: ${{ secrets.CDP_SOLANA_ADDRESS }}
          DFNS_AUTH_TOKEN: ${{ secrets.DFNS_AUTH_TOKEN }}
          DFNS_CRED_ID: ${{ secrets.DFNS_CRED_ID }}
          DFNS_PRIVATE_KEY_PEM: ${{ secrets.DFNS_PRIVATE_KEY_PEM }}
          DFNS_WALLET_ID: ${{ secrets.DFNS_WALLET_ID }}
          DFNS_API_BASE_URL: ${{ secrets.DFNS_API_BASE_URL }}
          CROSSMINT_API_KEY: ${{ secrets.CROSSMINT_API_KEY }}
          CROSSMINT_WALLET_LOCATOR: ${{ secrets.CROSSMINT_WALLET_LOCATOR }}
          CROSSMINT_API_BASE_URL: ${{ secrets.CROSSMINT_API_BASE_URL }}
          CROSSMINT_SIGNER_SECRET: ${{ secrets.CROSSMINT_SIGNER_SECRET }}
          CROSSMINT_SIGNER: ${{ secrets.CROSSMINT_SIGNER }}
        run: |
          set -euo pipefail

          if [ -z "${TS_LIVE_PACKAGES}" ]; then
            echo "No enabled TypeScript external live integration packages; skipping."
            exit 0
          fi

          for package_name in ${TS_LIVE_PACKAGES}; do
            echo "Running @solana/keychain-${package_name} integration tests"
            pnpm -F "@solana/keychain-${package_name}" run test:integration
          done

      - name: Verify PR head SHA is unchanged
        id: verify-sha
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ steps.pr.outputs.pr_number }}');
            const expectedSha = '${{ steps.pr.outputs.head_sha }}';

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            if (pr.head.sha !== expectedSha) {
              core.setFailed(
                `PR #${prNumber} head changed during run. Expected ${expectedSha}, got ${pr.head.sha}. Re-run this workflow.`
              );
              return;
            }

            core.setOutput("head_sha", expectedSha);

      - name: Post marker and rerun gate
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ steps.pr.outputs.pr_number }}');
            const headSha = '${{ steps.verify-sha.outputs.head_sha }}';
            const headRef = '${{ steps.pr.outputs.head_ref }}';
            const marker = `fork-external-live-pass:${headSha}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `${marker}\n\nExternal live tests passed in ${runUrl}.`,
            });

            let runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "fork-live-gate.yml",
              event: "pull_request",
              head_sha: headSha,
              per_page: 1,
            });

            if (runs.data.workflow_runs.length === 0) {
              core.warning(`No Fork Live Gate run found for head_sha=${headSha}, falling back to branch filter.`);
              const branchRuns = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: "fork-live-gate.yml",
                event: "pull_request",
                branch: headRef,
                per_page: 10,
              });
              const match = branchRuns.data.workflow_runs.find(r => r.head_sha === headSha);
              if (!match) {
                core.warning(
                  `No Fork Live Gate run found for ${headSha} (branch: ${headRef}). ` +
                  `Push a new commit or re-run the gate manually.`
                );
                return;
              }
              runs = { data: { workflow_runs: [match] } };
            }

            const gateRunId = runs.data.workflow_runs[0].id;
            await github.request("POST /repos/{owner}/{repo}/actions/runs/{run_id}/rerun", {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: gateRunId,
            });

            core.info(`Re-ran Fork Live Gate workflow run ${gateRunId}.`);
