name: Publish Rust Crate

on:
  workflow_dispatch:
    inputs:
      publish-to-crates:
        description: 'Publish to crates.io'
        required: true
        default: true
        type: boolean
      create-github-release:
        description: 'Create GitHub release'
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-rust
  cancel-in-progress: false

jobs:
  guard-allowed-branch:
    name: Guard allowed source branch for release publish
    runs-on: ubuntu-latest
    steps:
      - name: Guard allowed source branch for release publish
        run: |
          case "${{ github.ref }}" in
            refs/heads/main|refs/heads/hotfix/*) ;;
            *)
              echo "::error::Publish Rust Crate must be run from main or hotfix/*. Current ref: ${{ github.ref }}"
              exit 1
              ;;
          esac

  publish:
    name: Publish solana-keychain crate
    runs-on: ubuntu-latest
    needs: guard-allowed-branch
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Build check
        run: cargo build

      - name: Get current version
        id: version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 solana-keychain v$VERSION"

      - name: Check if prerelease
        id: prerelease
        run: |
          if [[ "${{ steps.version.outputs.version }}" == *"-"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "📦 Pre-release version detected"
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push git tag
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "⏭️ Tag $TAG already exists, skipping"
          else
            git tag "$TAG"
            echo "✅ Created tag $TAG"
          fi
          git push origin "$TAG" 2>/dev/null || echo "⏭️ Tag already pushed"

      - name: Authenticate crates.io trusted publisher
        if: ${{ github.event.inputs.publish-to-crates == 'true' }}
        id: crates_io_auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4

      - name: Publish to crates.io
        if: ${{ github.event.inputs.publish-to-crates == 'true' }}
        run: |
          echo "📦 Publishing solana-keychain@${{ steps.version.outputs.version }} to crates.io..."
          cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates_io_auth.outputs.token }}

      - name: Create GitHub Release
        if: ${{ github.event.inputs.create-github-release == 'true' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tagName = `v${{ steps.version.outputs.version }}`;
            const releaseName = `solana-keychain v${{ steps.version.outputs.version }}`;
            const isPrerelease = '${{ steps.prerelease.outputs.is_prerelease }}' === 'true';

            // Check if release already exists
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tagName,
              });
              console.log(`⏭️ Release ${tagName} already exists, skipping`);
              return;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: releaseName,
              body: `Release of solana-keychain v${{ steps.version.outputs.version }} (Rust)\n\n**crates.io:** https://crates.io/crates/solana-keychain/${{ steps.version.outputs.version }}`,
              draft: false,
              prerelease: isPrerelease,
            });

            console.log(`✅ Created release: ${releaseName}`);

      - name: Publish summary
        run: |
          echo "## 🎉 solana-keychain Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: \`${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tag**: \`v${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.publish-to-crates }}" == "true" ]; then
            echo "✅ Published to crates.io: https://crates.io/crates/solana-keychain/${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "⏭️ Skipped crates.io publish" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ github.event.inputs.create-github-release }}" == "true" ]; then
            echo "✅ GitHub release created: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "⏭️ Skipped GitHub release creation" >> $GITHUB_STEP_SUMMARY
          fi
