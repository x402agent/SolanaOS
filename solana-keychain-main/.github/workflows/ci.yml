name: Rust CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  resolve-signers:
    runs-on: ubuntu-latest
    outputs:
      rust_unit_backends_json: ${{ steps.resolve.outputs.rust_unit_backends_json }}
      rust_unit_backend_count: ${{ steps.resolve.outputs.rust_unit_backend_count }}
      rust_integration_tests_json: ${{ steps.resolve.outputs.rust_integration_tests_json }}
      rust_integration_test_count: ${{ steps.resolve.outputs.rust_integration_test_count }}
      rust_ci_features: ${{ steps.resolve.outputs.rust_ci_features }}
    steps:
      - name: Resolve enabled signers from repository variables
        id: resolve
        uses: actions/github-script@v7
        env:
          CI_SIGNER_MEMORY_ENABLED: ${{ vars.CI_SIGNER_MEMORY_ENABLED }}
          CI_SIGNER_VAULT_ENABLED: ${{ vars.CI_SIGNER_VAULT_ENABLED }}
          CI_SIGNER_PRIVY_ENABLED: ${{ vars.CI_SIGNER_PRIVY_ENABLED }}
          CI_SIGNER_TURNKEY_ENABLED: ${{ vars.CI_SIGNER_TURNKEY_ENABLED }}
          CI_SIGNER_AWS_KMS_ENABLED: ${{ vars.CI_SIGNER_AWS_KMS_ENABLED }}
          CI_SIGNER_FIREBLOCKS_ENABLED: ${{ vars.CI_SIGNER_FIREBLOCKS_ENABLED }}
          CI_SIGNER_GCP_KMS_ENABLED: ${{ vars.CI_SIGNER_GCP_KMS_ENABLED }}
          CI_SIGNER_PARA_ENABLED: ${{ vars.CI_SIGNER_PARA_ENABLED }}
          CI_SIGNER_CDP_ENABLED: ${{ vars.CI_SIGNER_CDP_ENABLED }}
          CI_SIGNER_DFNS_ENABLED: ${{ vars.CI_SIGNER_DFNS_ENABLED }}
          CI_SIGNER_CROSSMINT_ENABLED: ${{ vars.CI_SIGNER_CROSSMINT_ENABLED }}
        with:
          script: |
            const parseVar = (name) => {
              const raw = process.env[name];
              if (raw !== 'true' && raw !== 'false') {
                const message = `${name} must be set to the string 'true' or 'false' in repository Actions variables. Received: ${raw ?? 'undefined'}`;
                core.setFailed(message);
                throw new Error(message);
              }
              return raw === 'true';
            };

            const enabled = {
              memory: parseVar('CI_SIGNER_MEMORY_ENABLED'),
              vault: parseVar('CI_SIGNER_VAULT_ENABLED'),
              privy: parseVar('CI_SIGNER_PRIVY_ENABLED'),
              turnkey: parseVar('CI_SIGNER_TURNKEY_ENABLED'),
              aws_kms: parseVar('CI_SIGNER_AWS_KMS_ENABLED'),
              fireblocks: parseVar('CI_SIGNER_FIREBLOCKS_ENABLED'),
              gcp_kms: parseVar('CI_SIGNER_GCP_KMS_ENABLED'),
              para: parseVar('CI_SIGNER_PARA_ENABLED'),
              cdp: parseVar('CI_SIGNER_CDP_ENABLED'),
              dfns: parseVar('CI_SIGNER_DFNS_ENABLED'),
              crossmint: parseVar('CI_SIGNER_CROSSMINT_ENABLED'),
            };

            const rustUnitOrder = [
              'memory',
              'vault',
              'privy',
              'turnkey',
              'aws_kms',
              'fireblocks',
              'gcp_kms',
              'cdp',
              'para',
              'dfns',
              'crossmint',
            ];
            const rustEnabledBackends = rustUnitOrder.filter((backend) => enabled[backend]);
            const rustUnitBackends = [...rustEnabledBackends];
            if (rustEnabledBackends.length === rustUnitOrder.length) {
              rustUnitBackends.push('all');
            }

            const rustIntegrationMap = [
              ['privy', 'test_privy_integration'],
              ['turnkey', 'test_turnkey_integration'],
              ['fireblocks', 'test_fireblocks_integration'],
              ['aws_kms', 'test_aws_kms_integration'],
              ['gcp_kms', 'test_gcp_kms_integration'],
              ['dfns', 'test_dfns_integration'],
              ['crossmint', 'test_crossmint_integration'],
            ];
            const rustIntegrationTests = rustIntegrationMap
              .filter(([signer]) => enabled[signer])
              .map(([, testName]) => testName);

            core.setOutput('rust_unit_backends_json', JSON.stringify(rustUnitBackends));
            core.setOutput('rust_unit_backend_count', String(rustUnitBackends.length));
            core.setOutput('rust_integration_tests_json', JSON.stringify(rustIntegrationTests));
            core.setOutput('rust_integration_test_count', String(rustIntegrationTests.length));
            core.setOutput('rust_ci_features', rustEnabledBackends.join(','));

  rust-test:
    needs: resolve-signers
    if: ${{ needs.resolve-signers.outputs.rust_unit_backend_count != '0' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    strategy:
      matrix:
        sdk_version: [v2, v3]
        backend: ${{ fromJSON(needs.resolve-signers.outputs.rust_unit_backends_json) }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build and test with SDK ${{ matrix.sdk_version }}
        run: |
          if [ "${{ matrix.sdk_version }}" = "v2" ]; then
            cargo build --locked --features ${{ matrix.backend }},sdk-v2,unsafe-debug
            cargo test --locked --features ${{ matrix.backend }},sdk-v2,unsafe-debug
          else
            cargo build --locked --no-default-features --features ${{ matrix.backend }},sdk-v3,unsafe-debug
            cargo test --locked --no-default-features --features ${{ matrix.backend }},sdk-v3,unsafe-debug
          fi

  rust-integration-test:
    needs: resolve-signers
    if: ${{ (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) && needs.resolve-signers.outputs.rust_integration_test_count != '0' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: rust
    strategy:
      matrix:
        sdk_version: [v2, v3]
        test: ${{ fromJSON(needs.resolve-signers.outputs.rust_integration_tests_json) }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Setup GCP credentials
        if: matrix.test == 'test_gcp_kms_integration'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      - name: Configure AWS credentials
        if: matrix.test == 'test_aws_kms_integration'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_KMS_REGION }}
      - name: Run ${{ matrix.test }} with SDK ${{ matrix.sdk_version }}
        env:
          PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID }}
          PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET }}
          PRIVY_WALLET_ID: ${{ secrets.PRIVY_WALLET_ID }}
          TURNKEY_API_PUBLIC_KEY: ${{ secrets.TURNKEY_API_KEY }}
          TURNKEY_API_PRIVATE_KEY: ${{ secrets.TURNKEY_API_PRIVATE_KEY }}
          TURNKEY_ORGANIZATION_ID: ${{ secrets.TURNKEY_ORGANIZATION_ID }}
          TURNKEY_PRIVATE_KEY_ID: ${{ secrets.TURNKEY_PRIVATE_KEY_ID }}
          TURNKEY_PUBLIC_KEY: ${{ secrets.TURNKEY_SIGNER_PUBKEY }}
          FIREBLOCKS_API_KEY: ${{ secrets.FIREBLOCKS_API_KEY }}
          FIREBLOCKS_PRIVATE_KEY_PEM: ${{ secrets.FIREBLOCKS_PRIVATE_KEY_PEM }}
          FIREBLOCKS_VAULT_ACCOUNT_ID: ${{ secrets.FIREBLOCKS_VAULT_ACCOUNT_ID }}
          GCP_KMS_KEY_NAME: ${{ secrets.GCP_KMS_KEY_NAME }}
          GCP_KMS_SIGNER_PUBKEY: ${{ secrets.GCP_KMS_SIGNER_PUBKEY }}
          AWS_KMS_KEY_ID: ${{ secrets.AWS_KMS_KEY_ID }}
          AWS_KMS_SIGNER_PUBKEY: ${{ secrets.AWS_KMS_SIGNER_PUBKEY }}
          AWS_KMS_REGION: ${{ secrets.AWS_KMS_REGION }}
          PARA_API_KEY: ${{ secrets.PARA_API_KEY }}
          PARA_WALLET_ID: ${{ secrets.PARA_WALLET_ID }}
          PARA_API_BASE_URL: ${{ secrets.PARA_API_BASE_URL }}
          CDP_API_KEY_ID: ${{ secrets.CDP_API_KEY_ID }}
          CDP_API_KEY_SECRET: ${{ secrets.CDP_API_KEY_SECRET }}
          CDP_WALLET_SECRET: ${{ secrets.CDP_WALLET_SECRET }}
          CDP_SOLANA_ADDRESS: ${{ secrets.CDP_SOLANA_ADDRESS }}
          DFNS_AUTH_TOKEN: ${{ secrets.DFNS_AUTH_TOKEN }}
          DFNS_CRED_ID: ${{ secrets.DFNS_CRED_ID }}
          DFNS_PRIVATE_KEY_PEM: ${{ secrets.DFNS_PRIVATE_KEY_PEM }}
          DFNS_WALLET_ID: ${{ secrets.DFNS_WALLET_ID }}
          DFNS_API_BASE_URL: ${{ secrets.DFNS_API_BASE_URL }}
          CROSSMINT_API_KEY: ${{ secrets.CROSSMINT_API_KEY }}
          CROSSMINT_WALLET_LOCATOR: ${{ secrets.CROSSMINT_WALLET_LOCATOR }}
          CROSSMINT_API_BASE_URL: ${{ secrets.CROSSMINT_API_BASE_URL }}
          CROSSMINT_SIGNER_SECRET: ${{ secrets.CROSSMINT_SIGNER_SECRET }}
          CROSSMINT_SIGNER: ${{ secrets.CROSSMINT_SIGNER }}
          SOLANA_RPC_URL: https://api.devnet.solana.com
        run: |
          ci_features="${{ needs.resolve-signers.outputs.rust_ci_features }}"
          if [ "${{ matrix.sdk_version }}" = "v2" ]; then
            cargo test --locked --no-default-features --features ${ci_features},sdk-v2,unsafe-debug,integration-tests tests::${{ matrix.test }}::
          else
            cargo test --locked --no-default-features --features ${ci_features},sdk-v3,unsafe-debug,integration-tests tests::${{ matrix.test }}::
          fi

  rust-format:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  rust-lint:
    needs: resolve-signers
    if: ${{ needs.resolve-signers.outputs.rust_unit_backend_count != '0' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Clippy SDK v2
        run: cargo clippy --locked --all-targets --features ${{ needs.resolve-signers.outputs.rust_ci_features }},sdk-v2,unsafe-debug,integration-tests -- -D warnings
      - name: Clippy SDK v3
        run: cargo clippy --locked --all-targets --no-default-features --features ${{ needs.resolve-signers.outputs.rust_ci_features }},sdk-v3,unsafe-debug,integration-tests -- -D warnings
