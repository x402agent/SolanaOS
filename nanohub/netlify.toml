[build]
  publish = "dist"
  command = "bun run build:netlify"

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = ".netlify/functions"
  included_files = [".netlify/functions-internal/**"]
  node_bundler = "none"

[functions."server"]
  node_bundler = "none"

# Edge functions handle /st/* — must come before the SSR catch-all in _redirects
[[redirects]]
  from = "/st/*"
  to = "/st/:splat"
  status = 200
