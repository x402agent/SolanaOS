<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SolanaOS Console — The Solana Computer</title>
<meta name="description" content="SolanaOS Console: CRT-style interactive documentation for the autonomous Solana trading runtime. Overview, strategy, API reference, and more.">
<meta name="theme-color" content="#0a0a0f">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #14F195;
    --green-dim: #0a7a4a;
    --green-glow: #14F19580;
    --purple: #9945FF;
    --purple-dim: #6B21A8;
    --orange: #FF5A1F;
    --amber: #FFB800;
    --red: #FF3B3B;
    --bg-deep: #0a0a0f;
    --bg-panel: #0d0d14;
    --bg-card: #12121c;
    --bg-hover: #1a1a2e;
    --text-primary: #e0e0e0;
    --text-dim: #6b7280;
    --border: #1e1e2e;
    --scanline: rgba(0,0,0,0.12);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    line-height: 1.6;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 9999;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, var(--scanline) 2px, var(--scanline) 4px);
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 9998;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.5) 100%);
  }

  .boot-screen {
    position: fixed; inset: 0; z-index: 10000;
    background: var(--bg-deep);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: 'VT323', monospace;
    transition: opacity 0.8s ease;
  }
  .boot-screen.fade-out { opacity: 0; pointer-events: none; }
  .boot-screen .boot-text {
    color: var(--green); font-size: 18px; text-align: left;
    max-width: 700px; width: 90%;
    text-shadow: 0 0 8px var(--green-glow);
  }
  .boot-screen .boot-text .line { opacity: 0; animation: bootLine 0.1s forwards; white-space: pre; }
  .boot-cursor {
    display: inline-block; width: 10px; height: 18px;
    background: var(--green); animation: blink 0.6s step-end infinite;
    vertical-align: middle; margin-left: 2px;
  }
  @keyframes bootLine { to { opacity: 1; } }
  @keyframes blink { 50% { opacity: 0; } }

  .shell { min-height: 100vh; display: flex; flex-direction: column; }

  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg-panel); border-bottom: 1px solid var(--border);
    padding: 0 20px; height: 48px;
    display: flex; align-items: center; justify-content: space-between;
    backdrop-filter: blur(12px);
  }
  .topbar-logo {
    font-family: 'VT323', monospace; font-size: 22px; color: var(--green);
    text-shadow: 0 0 10px var(--green-glow); letter-spacing: 2px;
    display: flex; align-items: center; gap: 8px;
    text-decoration: none;
  }
  .topbar-logo .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 6px var(--green);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .topbar-status {
    font-size: 11px; color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
  }
  .topbar-status span { color: var(--green); }
  .topbar-back {
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    color: var(--text-dim); text-decoration: none;
    padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px;
    transition: all 0.2s;
  }
  .topbar-back:hover { color: var(--green); border-color: var(--green-dim); }

  .nav-bar {
    background: var(--bg-panel); border-bottom: 1px solid var(--border);
    display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .nav-bar::-webkit-scrollbar { display: none; }
  .nav-btn {
    background: none; border: none; color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
    padding: 12px 18px; cursor: pointer; white-space: nowrap;
    border-bottom: 2px solid transparent; transition: all 0.2s;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .nav-btn:hover { color: var(--text-primary); background: var(--bg-hover); }
  .nav-btn.active { color: var(--green); border-bottom-color: var(--green); text-shadow: 0 0 8px var(--green-glow); }

  .main-content { flex: 1; max-width: 960px; width: 100%; margin: 0 auto; padding: 32px 20px 80px; }

  .section-header {
    font-family: 'VT323', monospace; font-size: 36px; color: var(--green);
    text-shadow: 0 0 20px var(--green-glow); margin-bottom: 8px; letter-spacing: 2px;
  }
  .section-sub {
    color: var(--text-dim); font-size: 13px; margin-bottom: 32px;
    font-family: 'Share Tech Mono', monospace;
  }

  .terminal {
    background: #000; border: 1px solid var(--border); border-radius: 6px;
    padding: 16px 20px; margin: 20px 0;
    font-family: 'Share Tech Mono', monospace; font-size: 13px;
    color: var(--green); overflow-x: auto; position: relative;
  }
  .terminal::before {
    content: '\25CF  \25CF  \25CF'; display: block; font-size: 10px;
    color: var(--text-dim); margin-bottom: 12px; letter-spacing: 4px;
  }
  .terminal .prompt { color: var(--purple); }
  .terminal .comment { color: var(--text-dim); }
  .terminal .flag { color: var(--orange); }
  .terminal .output { color: var(--text-dim); opacity: 0.8; }

  .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin: 24px 0; }
  .card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    padding: 20px; transition: all 0.25s;
  }
  .card:hover { border-color: var(--green-dim); box-shadow: 0 0 20px rgba(20, 241, 149, 0.05); transform: translateY(-2px); }
  .card-icon { font-size: 24px; margin-bottom: 12px; display: block; }
  .card-title { font-family: 'VT323', monospace; font-size: 20px; color: var(--green); margin-bottom: 8px; }
  .card-desc { font-size: 12px; color: var(--text-dim); line-height: 1.7; }

  .data-table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 12px; }
  .data-table th {
    text-align: left; padding: 10px 14px; background: var(--bg-card); color: var(--green);
    font-family: 'Share Tech Mono', monospace; font-weight: normal;
    text-transform: uppercase; letter-spacing: 1px; font-size: 11px;
    border-bottom: 1px solid var(--green-dim);
  }
  .data-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text-dim); }
  .data-table tr:hover td { background: var(--bg-hover); color: var(--text-primary); }
  .data-table .val { color: var(--amber); font-family: 'Share Tech Mono', monospace; }
  .data-table .tag {
    display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px;
    font-family: 'Share Tech Mono', monospace; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .tag-green { background: rgba(20,241,149,0.1); color: var(--green); border: 1px solid var(--green-dim); }
  .tag-purple { background: rgba(153,69,255,0.1); color: var(--purple); border: 1px solid var(--purple-dim); }
  .tag-orange { background: rgba(255,90,31,0.1); color: var(--orange); border: 1px solid #993a13; }
  .tag-amber { background: rgba(255,184,0,0.1); color: var(--amber); border: 1px solid #996f00; }
  .tag-red { background: rgba(255,59,59,0.1); color: var(--red); border: 1px solid #992323; }

  .prose { color: var(--text-dim); font-size: 13px; line-height: 1.8; margin: 16px 0; }
  .prose strong { color: var(--text-primary); }
  .prose em { color: var(--green); font-style: normal; }

  .doctrine-list { list-style: none; margin: 16px 0; }
  .doctrine-list li { padding: 8px 0 8px 24px; position: relative; color: var(--text-dim); font-size: 13px; line-height: 1.7; }
  .doctrine-list li::before { content: '\25B8'; position: absolute; left: 4px; color: var(--green); }

  .arch-box {
    background: #000; border: 1px solid var(--border); border-radius: 6px;
    padding: 24px; margin: 24px 0;
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    color: var(--green); overflow-x: auto; white-space: pre; line-height: 1.4;
    text-shadow: 0 0 4px var(--green-glow);
  }

  .gauge-row { display: flex; align-items: center; gap: 12px; margin: 8px 0; }
  .gauge-label { width: 120px; font-size: 11px; color: var(--text-dim); font-family: 'Share Tech Mono', monospace; text-transform: uppercase; }
  .gauge-bar { flex: 1; height: 8px; background: var(--bg-card); border-radius: 4px; overflow: hidden; }
  .gauge-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }
  .gauge-val { width: 40px; text-align: right; font-size: 11px; font-family: 'Share Tech Mono', monospace; color: var(--amber); }

  .venue-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    padding: 24px; margin: 16px 0; border-left: 3px solid var(--green);
  }
  .venue-card.hl { border-left-color: var(--purple); }
  .venue-card.aster { border-left-color: var(--orange); }
  .venue-card .venue-name { font-family: 'VT323', monospace; font-size: 22px; margin-bottom: 4px; }
  .venue-card .venue-type { font-size: 11px; color: var(--text-dim); font-family: 'Share Tech Mono', monospace; margin-bottom: 16px; }
  .param-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
  .param-item { display: flex; justify-content: space-between; font-size: 11px; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .param-item .pk { color: var(--text-dim); }
  .param-item .pv { color: var(--amber); font-family: 'Share Tech Mono', monospace; }

  .cascade-bar {
    display: flex; align-items: center; gap: 12px; padding: 12px 16px; margin: 8px 0;
    background: var(--bg-card); border-radius: 6px; border-left: 3px solid var(--green);
  }
  .cascade-bar.warn { border-left-color: var(--amber); }
  .cascade-bar.danger { border-left-color: var(--orange); }
  .cascade-bar.critical { border-left-color: var(--red); }
  .cascade-pct { font-family: 'VT323', monospace; font-size: 28px; width: 60px; text-align: center; }
  .cascade-bar.warn .cascade-pct { color: var(--amber); }
  .cascade-bar.danger .cascade-pct { color: var(--orange); }
  .cascade-bar.critical .cascade-pct { color: var(--red); }
  .cascade-action { font-size: 12px; color: var(--text-dim); line-height: 1.5; }

  .evo-timeline { display: flex; align-items: center; gap: 0; margin: 24px 0; overflow-x: auto; padding-bottom: 8px; }
  .evo-stage { display: flex; flex-direction: column; align-items: center; min-width: 100px; }
  .evo-icon {
    width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 20px;
    background: var(--bg-card); position: relative; z-index: 2;
  }
  .evo-stage.active .evo-icon { border-color: var(--green); box-shadow: 0 0 16px var(--green-glow); }
  .evo-stage.ghost .evo-icon { border-color: var(--red); opacity: 0.5; }
  .evo-label { font-size: 10px; color: var(--text-dim); margin-top: 8px; font-family: 'Share Tech Mono', monospace; text-transform: uppercase; }
  .evo-connector { flex: 1; height: 2px; background: var(--border); min-width: 30px; }

  .ooda-flow { display: flex; align-items: center; gap: 0; margin: 24px 0; overflow-x: auto; padding: 16px 0; }
  .ooda-node {
    min-width: 100px; padding: 14px 16px; background: var(--bg-card);
    border: 1px solid var(--border); border-radius: 8px; text-align: center; flex-shrink: 0;
  }
  .ooda-node .ooda-label { font-family: 'VT323', monospace; font-size: 18px; color: var(--green); margin-bottom: 4px; }
  .ooda-node .ooda-desc { font-size: 10px; color: var(--text-dim); line-height: 1.4; }
  .ooda-arrow { font-size: 18px; color: var(--green-dim); padding: 0 6px; flex-shrink: 0; }

  .status-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; font-size: 12px; font-family: 'Share Tech Mono', monospace; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.warn { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  .status-dot.off { background: var(--text-dim); }

  .sensor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin: 20px 0; }
  .sensor-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; padding: 16px; text-align: center; }
  .sensor-icon { font-size: 28px; margin-bottom: 8px; }
  .sensor-name { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--text-primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .sensor-desc { font-size: 11px; color: var(--text-dim); }

  code { background: var(--bg-card); padding: 2px 6px; border-radius: 3px; font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--amber); }

  .endpoint-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin: 12px 0; }
  .endpoint-method { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-family: 'Share Tech Mono', monospace; font-weight: bold; margin-right: 8px; }
  .method-get { background: rgba(20,241,149,0.15); color: var(--green); }
  .method-post { background: rgba(153,69,255,0.15); color: var(--purple); }
  .method-put { background: rgba(255,184,0,0.15); color: var(--amber); }
  .method-delete { background: rgba(255,59,59,0.15); color: var(--red); }
  .endpoint-path { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--text-primary); }
  .endpoint-desc { font-size: 12px; color: var(--text-dim); margin-top: 8px; }

  .glow-line { height: 1px; background: linear-gradient(90deg, transparent, var(--green), transparent); margin: 32px 0; opacity: 0.4; }

  .footer {
    text-align: center; padding: 40px 20px; border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text-dim); font-family: 'Share Tech Mono', monospace;
  }
  .footer a { color: var(--green); text-decoration: none; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-deep); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--green-dim); }

  .page-enter { animation: fadeUp 0.35s ease forwards; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 640px) {
    .main-content { padding: 20px 14px 60px; }
    .section-header { font-size: 28px; }
    .card-grid { grid-template-columns: 1fr; }
    .param-grid { grid-template-columns: 1fr; }
    .arch-box { font-size: 9px; padding: 16px; }
    .topbar { padding: 0 12px; }
    .nav-btn { padding: 10px 14px; font-size: 11px; }
  }
</style>
</head>
<body>

<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function BootScreen({ onComplete }) {
  const [lines, setLines] = useState([]);
  const bootLines = [
    'SolanaOS v2.1 \u2014 The Solana Computer',
    '(c) 2026 SolanaOS Labs',
    '',
    'BIOS: Checking runtime integrity... OK',
    'CPU: Go 1.25+ runtime detected',
    'MEM: Vault memory initialized (KNOWN/LEARNED/INFERRED)',
    'NET: SolanaTracker RPC... CONNECTED',
    'NET: Helius fallback... STANDBY',
    'NET: Hyperliquid WS... CONNECTED',
    'NET: Aster perps... CONNECTED',
    'LLM: OpenRouter (mimo-v2-pro)... READY',
    'MEM: Honcho v3 session memory... ONLINE',
    'HW:  Arduino Modulino I2C... STUB MODE',
    'PAY: x402 facilitator... LOADED',
    '',
    'Loading SOUL.md.............. OK',
    'Loading STRATEGY.md.......... OK',
    'Confidence model calibrated.. OK',
    'Drawdown cascade armed....... OK',
    'TamaGOchi state: EGG',
    '',
    'OODA engine starting...',
    '> Observe \u2192 Orient \u2192 Decide \u2192 Act \u2192 Learn',
    '',
    '\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588 100%',
    '',
    'SolanaOS ready. Entering shell...',
  ];

  useEffect(() => {
    let i = 0;
    const timer = setInterval(() => {
      if (i < bootLines.length) {
        setLines(prev => [...prev, bootLines[i]]);
        i++;
      } else {
        clearInterval(timer);
        setTimeout(onComplete, 600);
      }
    }, 65);
    return () => clearInterval(timer);
  }, []);

  return (
    <div className="boot-screen" id="boot">
      <div className="boot-text">
        {lines.map((line, i) => (
          <div key={i} className="line" style={{ animationDelay: `${i * 0.02}s` }}>{line}</div>
        ))}
        <span className="boot-cursor" />
      </div>
    </div>
  );
}

function OverviewPage() {
  return (
    <div className="page-enter">
      <div className="section-header">{'>'} OVERVIEW</div>
      <div className="section-sub">SolanaOS \u2014 Autonomous operator runtime for Solana</div>
      <p className="prose">
        SolanaOS is an autonomous trading and operations runtime built in <em>pure Go</em>. It combines an OODA-loop trading engine, a dual-layer memory system, multi-venue execution across Solana spot and perpetuals, and an optional hardware interface \u2014 all in a single statically-linked binary.
      </p>
      <div className="card-grid">
        <div className="card"><span className="card-icon">{'\u27F3'}</span><div className="card-title">OODA Engine</div><div className="card-desc">Observe \u2192 Orient \u2192 Decide \u2192 Act loop for spot swaps, Hyperliquid perps, and Aster perps with venue-aware sizing, stops, and exits.</div></div>
        <div className="card"><span className="card-icon">{'\u25C8'}</span><div className="card-title">Dual Memory</div><div className="card-desc">Local recursive vault (KNOWN / LEARNED / INFERRED) plus Honcho v3 for session memory and durable trading conclusions.</div></div>
        <div className="card"><span className="card-icon">{'\u2B21'}</span><div className="card-title">Multi-Surface</div><div className="card-desc">Telegram bot, web console, Chrome extension, macOS menu bar, Android companion, and SolanaOS Control API.</div></div>
        <div className="card"><span className="card-icon">{'\u25C9'}</span><div className="card-title">Real Solana</div><div className="card-desc">SolanaTracker RPC + Datastream, Jupiter swaps, Helius fallback, on-chain wallet management.</div></div>
        <div className="card"><span className="card-icon">{'\u25A5'}</span><div className="card-title">Hardware I/O</div><div className="card-desc">Arduino Modulino I2C \u2014 LEDs, buzzer, buttons, knob, IMU, thermo, ToF. Physical feedback for runtime state.</div></div>
        <div className="card"><span className="card-icon">{'\u26A1'}</span><div className="card-title">x402 Payments</div><div className="card-desc">Crypto-gated API paywall and facilitator proxy. SVM signer for Solana transaction authorization.</div></div>
      </div>
      <div className="glow-line" />
      <div className="section-header" style={{fontSize: 24}}>{'>'} ARCHITECTURE</div>
      <div className="arch-box">{`\u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510
\u2502                      SolanaOS Runtime                        \u2502
\u2502                                                              \u2502
\u2502  \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510  \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510  \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510  \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510  \u2502
\u2502  \u2502  OODA   \u2502  \u2502 Memory  \u2502  \u2502  LLM    \u2502  \u2502 Control Plane \u2502  \u2502
\u2502  \u2502 Engine  \u2502  \u2502 Stack   \u2502  \u2502 Router  \u2502  \u2502               \u2502  \u2502

function SoulPage() {
  return (

      <div className="glow-line" />
      <div className="section-header" style={{fontSize: 22}}>{'>'} CORE BELIEFS</div>
      <ul className="doctrine-list">
        <li>Momentum is real until it isn't. The value is in knowing the transition point.</li>
        <li>Liquidity is the only ground truth. Narrative follows; it does not lead.</li>
        <li>On-chain data is more reliable than human commentary. The chain does not editorialize.</li>
        <li>Funding rates reveal what the crowd is paying to be wrong.</li>
        <li>A partial capture of a real move beats a missed opportunity at full size.</li>
        <li>The best trade is the one exited before the crowd reaches the same conclusion.</li>

      <div className="glow-line" />
      <div className="section-header" style={{fontSize: 22}}>{'>'} RISK DOCTRINE</div>

        <li>Position size is a function of evidence-weighted confidence, not conviction.</li>
        <li>The distinction between confidence and conviction is the presence of evidence.</li>
        <li>Missing a move is always preferable to being caught in a liquidity flush.</li>
        <li>Kelly Criterion is a theoretical ceiling, not a practical target.</li>
        <li>Capital preservation through drawdown cascades takes absolute priority.</li>

      <div className="glow-line" />
      <div className="section-header" style={{fontSize: 22}}>{'>'} EPISTEMOLOGICAL FRAMEWORK</div>

function GatewayPage() {

        <tbody>
          <tr><td><code>auth.challenge</code></td><td>{'\u2190'} daemon</td><td>Ed25519 challenge nonce</td></tr>
          <tr><td><code>auth.response</code></td><td>{'\u2192'} daemon</td><td>Signed challenge response</td></tr>
          <tr><td><code>chat.message</code></td><td>{'\u2194'} both</td><td>Natural language message</td></tr>
          <tr><td><code>tool.invoke</code></td><td>{'\u2192'} daemon</td><td>Invoke a tool on the daemon</td></tr>
          <tr><td><code>tool.result</code></td><td>{'\u2190'} daemon</td><td>Tool execution result</td></tr>
          <tr><td><code>state.sync</code></td><td>{'\u2190'} daemon</td><td>Full state snapshot</td></tr>
          <tr><td><code>event.trade</code></td><td>{'\u2190'} daemon</td><td>Trade execution notification</td></tr>
          <tr><td><code>event.alert</code></td><td>{'\u2190'} daemon</td><td>Risk alert or drawdown trigger</td></tr>
        </tbody>
      </table>
      <div className="glow-line" />
      <div className="section-header" style={{fontSize: 22}}>{'>'} GATEWAY CONFIG</div>

      </div>
    </div>
  );
}

function App() {
  const [booted, setBooted] = useState(false);
  const [bootFading, setBootFading] = useState(false);
  const [page, setPage] = useState('overview');
  const pages = [
    { id: 'overview', label: 'Overview' },
    { id: 'soul', label: 'Soul' },
    { id: 'strategy', label: 'Strategy' },
    { id: 'install', label: 'Install' },
    { id: 'commands', label: 'Commands' },
    { id: 'hardware', label: 'Hardware' },
    { id: 'api', label: 'API' },
    { id: 'gateway', label: 'Gateway' },
  ];
  const handleBootComplete = () => { setBootFading(true); setTimeout(() => setBooted(true), 800); };
  const renderPage = () => {
    switch (page) {
      case 'overview': return <OverviewPage />;
      case 'soul': return <SoulPage />;
      case 'strategy': return <StrategyPage />;
      case 'install': return <InstallPage />;
      case 'commands': return <CommandsPage />;
      case 'hardware': return <HardwarePage />;
      case 'api': return <ApiPage />;
      case 'gateway': return <GatewayPage />;
      default: return <OverviewPage />;
    }
  };
  return (
    <>
      {!booted && <BootScreen onComplete={handleBootComplete} />}
      {bootFading || booted ? (
        <div className="shell">
          <div className="topbar">
            <a href="/" className="topbar-logo"><span className="dot" /> SOLANAOS</a>
            <div className="topbar-right">
              <a href="/" className="topbar-back">{'\u2190'} MAIN SITE</a>
              <div className="topbar-status">v2.1 <span>|</span> mainnet <span>|</span> ooda: <span>active</span></div>
            </div>
          </div>
          <div className="nav-bar">
            {pages.map(p => (
              <button key={p.id} className={`nav-btn ${page === p.id ? 'active' : ''}`} onClick={() => setPage(p.id)}>{p.label}</button>
            ))}
          </div>
          <div className="main-content">{renderPage()}</div>
          <div className="footer">
            SolanaOS v2.1 \u2014 The Solana Computer \xB7 <a href="https://github.com/x402agent/NanoSolana">GitHub</a> \xB7 <a href="/">Main Site</a> \xB7 <a href="/guide">Guide</a> \xB7 <a href="/hardware">Hardware Guide</a>
          </div>
        </div>
      ) : null}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>
</body>
</html>
