[build]
  command       = "npm run build"
  publish       = "dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy /hub to the SolanaOS Hub app
[[redirects]]
  from   = "/hub"
  to     = "https://seeker.solanaos.net"
  status = 301
  force  = true

[[redirects]]
  from   = "/hub/*"
  to     = "https://seeker.solanaos.net/:splat"
  status = 301
  force  = true

# Clean URLs for multi-page site
[[redirects]]
  from   = "/guide"
  to     = "/guide.html"
  status = 200

[[redirects]]
  from   = "/hardware"
  to     = "/hardware.html"
  status = 200

[[redirects]]
  from   = "/console"
  to     = "/console.html"
  status = 200

# Fallback to index for unknown routes
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security & performance headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Custom domain: docs.solanaos.net
# Point a CNAME record to <site-name>.netlify.app and
# add docs.solanaos.net in Site Settings → Domain Management.
