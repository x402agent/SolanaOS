version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/npm/solanaos"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: "npm"
    directory: "/npm/solanaos-installer"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
