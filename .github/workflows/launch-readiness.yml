name: launch-readiness

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  go-runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test Go packages
        run: go test ./...

  nanohub-netlify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nanohub
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install NanoHub deps
        run: bun install --frozen-lockfile

      - name: Verify Netlify build
        run: bun run build:netlify
