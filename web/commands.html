<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=/commands/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SolanaOS Command Deck</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #04050b, #0a0c15);
      color: #e8eef8;
      font: 15px/1.6 "JetBrains Mono", monospace;
    }
    .card {
      width: min(720px, calc(100% - 32px));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 28px;
      background: rgba(16, 16, 28, 0.9);
      box-shadow: 0 24px 80px rgba(0,0,0,0.3);
    }
    h1 { margin: 0 0 12px; color: #14f195; }
    p { margin: 0 0 14px; color: #8a95ab; }
    a { color: #00d4ff; }
    code { color: #14f195; }
  </style>
</head>
<body>
  <div class="card">
    <h1>SolanaOS Command Deck</h1>
    <p>Redirecting to the new commands page inside the SolanaOS web site.</p>
    <p>If the redirect does not fire, open <a href="/commands/"><code>/commands/</code></a>.</p>
  </div>
</body>
</html>
